name: CI
on: [push, pull_request]

# Don't pile up concurrent runs on the same ref: each run opens many Neon
# connections, and overlapping runs can exhaust the free-tier connection limit
# (which made a run hang indefinitely). Newer push on a ref cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # hard stop so a stuck DB connection can't hang the job for 14m+
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      # DB-backed tests run in an isolated throwaway schema; they skip automatically
      # if DATABASE_URL is not configured as a repository secret.
      - run: pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
