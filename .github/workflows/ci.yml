name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      # DB-backed tests run in an isolated throwaway schema; they skip automatically
      # if DATABASE_URL is not configured as a repository secret.
      - run: pytest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
