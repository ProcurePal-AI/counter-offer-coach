# PREDICTIONS SCHEMA
# Structural output generated by the Category 3 Should-Cost Engine.
predictions:
  type: array
  items:
    type: object
    required:
      - chemical_id
      - route
      - period
      - region
      - predicted_price_usd_per_kg
      - confidence_band
      - cost_breakdown
      - inputs_snapshot
      - model_version
      - generated_at
    properties:
      chemical_id: { type: string }
      route: { type: string }
      period: { type: string, pattern: "^[0-9]{4}-[0-9]{2}$" }
      region: { type: string }
      predicted_price_usd_per_kg: { type: number, minimum: 0.0 }
      confidence_band:
        type: object
        required: [p10, p50, p90]
        properties:
          p10: { type: number }
          p50: { type: number }
          p90: { type: number }
      cost_breakdown:
        type: object
        required: [feedstock_pct, utility_pct, markup_pct, by_step]
        properties:
          feedstock_pct: { type: number, minimum: 0.0, maximum: 1.0 }
          utility_pct: { type: number, minimum: 0.0, maximum: 1.0 }
          markup_pct: { type: number, minimum: 0.0, maximum: 1.0 }
          by_step:
            type: object
            additionalProperties: { type: number, minimum: 0.0, maximum: 1.0 }
      inputs_snapshot:
        type: object
        additionalProperties: { type: number }
      model_version: { type: string }
      generated_at: { type: string, format: "date-time" }
