# Aniline process configuration -- conforms to docs/schema/process_config.schema.yaml
# Route: benzene nitration -> vapor-phase hydrogenation (industry standard, 80%+ of output)
# Base-case numbers; [VARIABLE] fields feed sensitivity / Monte Carlo in the engine.
# Sources: Ullmann's "Aniline"; Winter et al. (2021) J. Cleaner Production; Towler & Sinnott Ch 6-7
processes:
  aniline:
    routes:
      benzene_nitration_hydrogenation:
        is_default: true                                # [LEO] vapor-phase, 80%+ of global output
        steps:
          - step_id: nitration
            order: 1
            inputs:
              - chemical_id: benzene
                stoichiometric_ratio: 1.0               # [CHEMISTRY] C6H6 + HNO3 -> C6H5NO2 + H2O
              - chemical_id: nitric_acid
                stoichiometric_ratio: 1.0               # [CHEMISTRY]
            main_output: nitrobenzene
            co_products:
              - chemical_id: water
                stoichiometric_ratio: 1.0               # [CHEMISTRY]
            yield_pct:
              value: 98.0                               # [LEO+WINTER]
              uncertainty: 1.0                          # [EST] assumed band; tighten if Cat 1 finds a sourced figure
              source: "Ullmann's Aniline; Winter et al. 2021"
              confidence: high
            energy:
              electricity_kwh_per_ton_output: 120        # [ASSUMED SPLIT] route total ~300 kWh/t; sums with hydrogenation (180)
              steam_gj_per_ton_output: 1.5               # [ASSUMED SPLIT] route total ~4.0 GJ/t; mixed-acid reconcentration is steam-heavy
              source: "assumed split of route total (Leo); per-step split NOT in primary source -- refine with ecoinvent/Ullmann's"
              confidence: low
            catalyst:
              name: "sulfuric acid (mixed-acid catalyst)"  # [CHEMISTRY] H2SO4 generates the nitronium ion
              cost_usd_per_ton_output: 3.6              # [LEO] H2SO4 makeup 0.03 t/t x ~$120/t; counted here (not in inputs) to avoid double-count
          - step_id: hydrogenation
            order: 2
            inputs:
              - chemical_id: nitrobenzene
                stoichiometric_ratio: 1.0               # [CHEMISTRY] C6H5NO2 + 3H2 -> C6H5NH2 + 2H2O
              - chemical_id: hydrogen
                stoichiometric_ratio: 3.0               # [CHEMISTRY]
            main_output: aniline
            co_products:
              - chemical_id: water
                stoichiometric_ratio: 2.0               # [CHEMISTRY]
            yield_pct:
              value: 99.0                               # [LEO+WINTER]
              uncertainty: 0.5                          # [EST] assumed band; tighten if Cat 1 finds a sourced figure
              source: "Ullmann's Aniline; Winter et al. 2021"
              confidence: high
            energy:
              electricity_kwh_per_ton_output: 180        # [ASSUMED SPLIT] route total ~300 kWh/t; vapor-phase recycle/compression is power-heavy
              steam_gj_per_ton_output: 2.5               # [ASSUMED SPLIT] route total ~4.0 GJ/t; sums with nitration (1.5)
              source: "assumed split of route total (Leo); per-step split NOT in primary source -- refine with ecoinvent/Ullmann's"
              confidence: low
            catalyst:
              name: "Cu_based"                          # [LEO] industry standard for vapor-phase
              cost_usd_per_ton_output: 10               # [LEO] base case; range 5–20
        markup:
          # Variable conversion = RESIDUAL allowance ONLY (minor unmodeled items:
          # process/cooling water, routine supplies, minor consumables, handling).
          # NOT an all-in conversion-cost markup — utilities + catalyst are modeled
          # explicitly above, so a full markup would DOUBLE-COUNT and inflate the
          # floor (which shrinks the premium). Towler supports component-based
          # estimation but does not provide an aniline-specific residual %. (Yuki, 1.3)
          variable_pct: 0.02                            # [SOFT PLACEHOLDER — YUKI 1.3] residual fraction of feedstock; sensitivity 0.00–0.05

          # Towler fixed costs are CAPITAL/LABOR-driven (maintenance = % of ISBL,
          # labor = shift positions x salary, etc.), NOT a % of feedstock. No plant
          # capital/labor data from public sources, so this is a COARSE SOFT
          # placeholder to let the deterministic engine run — treat as wide/uncertain
          # in calibration. Production should replace this with a capital/labor-based
          # $/ton estimate when sufficient data are available. (Yuki, 1.3)
          fixed_pct: 0.08                               # [SOFT PLACEHOLDER ONLY] coarse prototype fallback; NOT a researched feedstock fraction

          target_margin_pct: 0.05                       # [SOFT PLACEHOLDER — YUKI] Towler does not provide a commodity-organics EBITDA-margin benchmark; external source required.
                                                        # target_margin_pct is an input assumption.
          source: "Towler & Sinnott, Chemical Engineering Design, 3rd ed., Ch. 8 (Yuki 1.3): component-based variable-cost method; variable_pct = prototype residual allowance only; fixed_pct = coarse capital/labor-gap fallback only; EBITDA margin requires external benchmark"
